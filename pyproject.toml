[tool.black]
target-version = ["py39"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.mypy_cache
  | \.tox
  | \.venv
  | build
  | dist
  | node_modules
)/
'''

[tool.poetry]
name = "MITx Pro"
version = "0.1.0"
description = "MITx Pro"
authors = ["MIT ODL"]
license = "BSD-3"
readme = "README.md"
packages = []

[tool.poetry.dependencies]
python = "3.9.15"

beautifulsoup4 = "4.8.2"
boto3 = "1.26.18"
celery = "5.2.2"
celery-redbeat = "2.0.0"
dj-database-url = "0.5.0"
django = "3.2.21"
django-anymail = { version = "8.4", extras = ["mailgun"] }
django-filter = "2.4.0"
django-hijack = "2.1.10"
django-hijack-admin = "2.1.10"
django-ipware = "3.0.7"
django-redis = "5.0.0"
django-robots = "4.0.0"
django-silk = "^5.0.3"
django-webpack-loader = "0.7.0"
django-oauth-toolkit = "1.4.0"
django-user-agents = "0.4.0"
djangorestframework = "3.12.4"
djoser = "2.1.0"
edx-api-client = "1.7.0"
django-storages = "1.13.1"
drf-flex-fields = "0.8.5"
google-api-python-client = "1.7.11"
google-auth = "1.6.3"
hubspot-api-client = "^6.1.0"
ipython = "^8.10.0"
mitol-django-common = "2.7.0"
mitol-django-digital-credentials = "3.3.0"
mitol-django-hubspot-api = { version = "2023.5.22", extras = [] }
mitol-django-mail = "3.3.0"
mitol-django-oauth-toolkit-extensions = "1.3.0"
mitol-django-authentication = "1.6.0"
newrelic = "^8.4.0"
pdftotext = "2.1.1"
Pillow = "8.3.2"
psycopg2 = "2.8.3"
pycountry = "19.7.15"
pygsheets = "2.0.2"
PyNaCl = "1.3.0"
redis = "4.4.4"
requests = "^2.31.0"
sentry-sdk = "^1.22.0"
social-auth-app-django = "4.0.0"
ulid-py = "^1.1.0"
ua-parser = "0.8.0"
user-agents = "2.0"
user-util = "0.1.5"
uwsgi = "2.0.22"
wagtail = "2.13.4"
wagtail-metadata = "3.3.0"
zeep = "3.4.0"
flaky = "3.7.0"

[tool.poetry.group.dev.dependencies]
black = "^23"
bpython = "*"
django-debug-toolbar = "*"
factory-boy = "3.3.0"
faker = "13.16.0"
freezegun = "0.3.15"
hypothesis = "^4.23.4"
ipdb = "*"
nplusone = "^1.0.0"
pdbpp = "*"
pytest = "^6.1.2"
pytest-cov = "^4.1.0"
pytest-django = "*"
pytest-env = "*"
pytest-lazy-fixture = "0.6.3"
pytest-mock = "*"
responses = "*"
ruff = "*"
safety = "*"
semantic-version = "*"
wagtail-factories = "*"

[build-system]
requires = ["poetry_core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.ruff]
target-version = "py311"
line-length = 88
select = [
    "A",  # flake8-builtins
    # "AIR",  # Airflow
    # "ANN",  # flake8-annotations
    "ARG",  # flake8-unused-arguments
    # "ASYNC",  # flake8-async
    "B",  # flake8-bugbear
    "BLE",  # flake8-blind-except
    "C4",  # flake8-comprehensions
    "C90",  # mccabe
    # "COM",  # flake8-commas
    "CPY",  # flake8-copyright
    "D",  # pydocstyle
    # "DJ",  # flake8-django
    "DTZ",  # flake8-datetimez
    "E",  # Pycodestyle Error
    "EM",  # flake8-errmsg
    "ERA",  # eradicate
    "EXE",  # flake8-executable
    "F",  # Pyflakes
    "FA",  # flake8-future-annotations
    "FBT",  # flake8-boolean-trap
    "FIX",  # flake8-fixme
    "FLY",  # flynt
    # "FURB",  # refurb
    "G",  # flake8-logging-format
    "I",  # isort
    "ICN",  # flake8-import-conventions
    "INP",  # flake8-no-pep420
    "INT",  # flake8-gettext
    "ISC",  # flake8-implicit-str-concat
    "N",  # pep8-naming
    # "NPY",  # NumPy-specific rules
    # "PD",  # pandas-vet
    "PERF",  # Perflint
    "PGH",  # pygrep-hooks
    "PIE",  # flake8-pie
    "PL",  # Pylint
    "PT",  # flake8-pytest-style
    "PTH",  # flake8-use-pathlib
    "PYI",  # flake8-pyi
    "Q",  # flake8-quotes
    "RET",  # flake8-return
    "RSE",  # flake8-raise
    "RUF",  # Ruff-specific rules
    "S",  # flake8-bandit
    "SIM",  # flake8-simplify
    "SLF",  # flake8-self
    "SLOT",  # flake8-slots
    "T10",  # flake8-debugger
    "T20",  # flake8-print
    # "TCH",  # flake8-type-checking
    "TD",  # flake8-todos
    "TID",  # flake8-tidy-imports
    "TRY",  # tryceratops
    "UP",  # pyupgrade
    "W",  # Pycodestyle Warning
    "YTT",  # flake8-2020
]
ignore = [
    "B008",
    "B905",
    "D104",
    "D200",
    "D202",
    "D205",
    "D301",
    "D400",
    "N803",
    "N806",
    "N999",
    "PIE804",
    "RET505",
    "RET506",
    "RET507",
    "RET508",
    "RUF012",
    "UP007"
]
typing-modules = ["colour.hints"]

[tool.ruff.pydocstyle]
convention = "pep257"

[tool.ruff.flake8-quotes]
inline-quotes = "double"

[tool.ruff.per-file-ignores]
"tests/**" = ["S101"]
"test_*.py" = ["S101"]
"*_test.py" = ["S101"]
