x-environment: &py-environment
  NODE_ENV: "production"
  DEV_ENV: "True" # necessary to have nginx connect to web container
  SECRET_KEY: local_unsafe_key
  DATABASE_URL: postgres://postgres:postgres@db:5432/postgres
  MITOL_DIGITAL_CREDENTIALS_HMAC_SECRET: test-hmac-secret
  MITXPRO_BASE_URL: ${MITXPRO_BASE_URL:-http://xpro.odl.local:8053}
  MITXPRO_SECURE_SSL_REDIRECT: "False"
  MITXPRO_DB_DISABLE_SSL: "True"
  MITXPRO_ADMIN_EMAIL: admin@localhost
  MITOL_DIGITAL_CREDENTIALS_AUTH_TYPE: xpro
  CELERY_TASK_ALWAYS_EAGER: "False"
  REDIS_URL: redis://redis:6379/4
  DOCKER_HOST: ${DOCKER_HOST:-missing}
  WEBPACK_DEV_SERVER_HOST: ${WEBPACK_DEV_SERVER_HOST:-localhost}

x-extra-hosts: &default-extra-hosts
  - "host.docker.internal:host-gateway"
  - "local.openedx.io:host-gateway"

services:
  db:
    image: postgres:18.3@sha256:7e32e9833a6fb1c92c32552794cb6ed569d51b445a54907d35fc112ef39684db
    environment:
      POSTGRES_PASSWORD: postgres # pragma: allowlist secret
    ports:
      - "5432"

  redis:
    image: redis:8.6.3@sha256:4d25e2fe601f7ffaeb4437cb6ced3518bc36edf34ebe98863c80836943d94529
    ports:
      - "6379"

  nginx:
    image: nginx:1.30.0@sha256:55d1fb0944aafb8534b253e486c6cf57d3e0c785c4f6a7b3e9f02c5a080fb2ce
    ports:
      - "8053:8053"
    links:
      - web
    networks:
      default:
        aliases:
          # this ensures that containers route this hostname back to the web app
          - "xpro.odl.local"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    command: >
      /bin/bash -c '
      sleep 3 &&
      python3 manage.py collectstatic --noinput &&
      python3 manage.py migrate --noinput &&
      uwsgi uwsgi.ini --honour-stdin'
    stdin_open: true
    tty: true
    ports:
      - "8051:8051"
    environment:
      <<: *py-environment
      PORT: 8051
    env_file: .env
    links:
      - db
      - redis
    extra_hosts: *default-extra-hosts

  watch:
    image: node:24.14.0@sha256:5a593d74b632d1c6f816457477b6819760e13624455d587eef0fa418c8d0777b
    working_dir: /src
    command: >
      /bin/bash -c './webpack_dev_server.sh --install'
    ports:
      - "8052:8052"
    environment:
      PUBLIC_PATH: http://${MIT_XPRO_HOSTNAME:-xpro.odl.local}:8053/
      NODE_ENV: "production"
      DOCKER_HOST: ${DOCKER_HOST:-missing}
      CONTAINER_NAME: "watch"
    env_file: .env

  celery:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    environment: *py-environment
    env_file: .env
    command: >
      /bin/bash -c '
      sleep 3;
      celery -A mitxpro.celery:app worker -B -l ${MITXPRO_LOG_LEVEL:-INFO}'
    links:
      - db
      - redis
    extra_hosts: *default-extra-hosts
